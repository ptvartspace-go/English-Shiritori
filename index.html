<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Shiritori</title>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f2f1ed; --surface:#fff; --border:#e0dfd8; --text:#181816;
  --muted:#888884; --faint:#c8c7c0; --danger:#a32d2d; --danger-bg:#fdf0f0;
}
.c0{--pc:#7f77dd;--pb:#eeedfe;--pbd:#b0a9ee;--pt:#3c3489}
.c1{--pc:#1d9e75;--pb:#e1f5ee;--pbd:#5dcaa5;--pt:#0f6e56}
.c2{--pc:#d85a30;--pb:#faece7;--pbd:#f0997b;--pt:#993c1d}
.c3{--pc:#d4537e;--pb:#fbeaf0;--pbd:#ed93b1;--pt:#72243e}
.c4{--pc:#ba7517;--pb:#faeeda;--pbd:#ef9f27;--pt:#633806}
.c5{--pc:#378add;--pb:#e6f1fb;--pbd:#85b7eb;--pt:#0c447c}
.c6{--pc:#639922;--pb:#eaf3de;--pbd:#97c459;--pt:#27500a}
.c7{--pc:#533b9b;--pb:#eeebfa;--pbd:#a99de0;--pt:#2d1f6e}
.c8{--pc:#0f7d8a;--pb:#e0f5f7;--pbd:#5dc8d3;--pt:#065960}
.c9{--pc:#888780;--pb:#f1efe8;--pbd:#b4b2a9;--pt:#444441}

html,body{min-height:100vh;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);font-size:16px;line-height:1.5}
body{display:flex;flex-direction:column;align-items:center;padding:2.5rem 1rem 4rem}
.site-header{text-align:center;margin-bottom:2rem}
.site-header h1{font-size:2rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.25rem}
.site-header p{font-size:.9rem;color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:2rem;width:100%;max-width:540px;box-shadow:0 2px 20px rgba(0,0,0,.06)}
.eyebrow{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1rem}
.rules{background:var(--bg);border-radius:10px;padding:.9rem 1.1rem;font-size:.84rem;color:#555;line-height:1.75;margin-bottom:1.4rem}
.rules b{color:var(--text);font-weight:600}
input[type=text]{width:100%;padding:.6rem .9rem;font-size:1rem;border:1px solid var(--border);border-radius:9px;outline:none;background:var(--surface);color:var(--text);transition:border-color .15s,box-shadow .15s;font-family:inherit}
input[type=text]:focus{border-color:#7f77dd;box-shadow:0 0 0 3px rgba(127,119,221,.15)}
input[type=text]:disabled{background:var(--bg);color:var(--muted);cursor:not-allowed}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:.65rem 1.25rem;font-size:.95rem;font-weight:500;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:background .12s,transform .08s;font-family:inherit;width:100%}
.btn:hover{background:#eceae4}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.38;cursor:not-allowed;transform:none}
.btn-primary{background:#7f77dd;color:#fff;border-color:#7f77dd}.btn-primary:hover{background:#6a62cc;border-color:#6a62cc}
.btn-sm{width:auto;padding:.5rem .9rem;font-size:.86rem}
.btn-ghost{font-size:.82rem;color:var(--danger);border-color:#f5c4c4;background:var(--danger-bg)}.btn-ghost:hover{background:#fce0e0}
hr{border:none;border-top:1px solid var(--border);margin:1.25rem 0}

/* status */
.status-bar{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--muted);margin-bottom:1rem;min-height:1.1rem}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s;background:var(--faint)}
.sdot.ok{background:#1d9e75}.sdot.warn{background:#ba7517;animation:blink .9s ease-in-out infinite}.sdot.err{background:var(--danger)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* lobby */
.name-row{display:flex;gap:.6rem;margin-bottom:1rem}.name-row input{flex:1}
.invite-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:1.25rem}
.inv-label{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem}
.inv-desc{font-size:.84rem;color:#555;margin-bottom:.7rem;line-height:1.6}
.link-row{display:flex;align-items:center;gap:.5rem}
.link-row span{flex:1;font-size:.75rem;font-family:"Courier New",monospace;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:.35rem .6rem}
.link-copy{flex-shrink:0;font-size:.8rem;padding:.38rem .85rem;border-radius:7px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:inherit;color:var(--text);font-weight:500;transition:background .12s}.link-copy:hover{background:#e5e3dc}
.player-list{display:flex;flex-direction:column;gap:.45rem;margin-bottom:1rem}
.player-row{display:flex;align-items:center;gap:.65rem;padding:.55rem .8rem;border-radius:10px;font-size:.9rem}
.player-row .p-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:var(--pc)}
.player-row .p-name{flex:1;font-weight:500}
.player-row .p-badge{font-size:.72rem;font-weight:600;color:var(--pt);background:var(--pb);border:1px solid var(--pbd);border-radius:20px;padding:.15rem .55rem}
.player-row.empty{background:var(--bg);color:var(--faint);font-style:italic;font-size:.85rem}
.player-row.filled{background:var(--pb);color:var(--pt)}
.slots-note{font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:.75rem}
.waiting-row{display:flex;align-items:center;gap:.6rem;font-size:.84rem;color:var(--muted);margin-top:.75rem}
.pulse{width:8px;height:8px;border-radius:50%;background:#1d9e75;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}

/* game */
.scoreboard{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.25rem}
.score-row{display:flex;align-items:center;gap:.6rem;padding:.45rem .75rem;border-radius:9px;font-size:.88rem}
.score-row .s-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--pc)}
.score-row .s-name{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.score-row .s-words{font-weight:700;font-size:1rem;color:var(--pt)}
.score-row.active-turn{background:var(--pb);border:1px solid var(--pbd)}
.score-row.eliminated{opacity:.4;text-decoration:line-through}
.turn-banner{display:flex;align-items:center;gap:.6rem;padding:.65rem 1rem;border-radius:10px;margin-bottom:1.25rem;font-size:.92rem;font-weight:600;background:var(--pb);border:1px solid var(--pbd);color:var(--pt)}
.turn-dot{width:9px;height:9px;border-radius:50%;background:var(--pc)}
.chain-label{font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem}
.chain-wrap{min-height:58px;background:var(--bg);border-radius:10px;padding:.65rem .85rem;margin-bottom:1rem;display:flex;flex-wrap:wrap;align-items:center;gap:.3rem}
.chain-empty{font-size:.85rem;color:var(--faint)}
.chip{font-size:.82rem;font-weight:500;padding:.18rem .55rem;border-radius:20px;border:1px solid var(--pbd);background:var(--pb);color:var(--pt)}
.arr{font-size:.68rem;color:var(--faint)}
.req-letter{text-align:center;font-size:.88rem;color:var(--muted);margin-bottom:1rem}
.letter-badge{display:inline-block;font-size:1.35rem;font-weight:700;background:#eeedfe;color:#3c3489;border:1.5px solid #b0a9ee;border-radius:9px;padding:.1rem .7rem;margin-left:.4rem;line-height:1.5}
.input-row{display:flex;gap:.5rem;margin-bottom:.45rem}
.error{font-size:.83rem;color:var(--danger);min-height:1.2rem;text-align:center;margin-bottom:.5rem}
.checking{display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.83rem;color:var(--muted);min-height:1.2rem;margin-bottom:.5rem}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:#7f77dd;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.action-row{display:flex;gap:.5rem;margin-bottom:.25rem}
.action-row .btn{font-size:.85rem}

/* over */
.over-wrap{text-align:center}
.trophy{font-size:2.8rem;display:block;margin-bottom:.65rem}
.over-wrap h2{font-size:1.4rem;font-weight:700;margin-bottom:.35rem}
.over-sub{color:var(--muted);font-size:.88rem;margin-bottom:1.4rem;line-height:1.6}
.final-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.4rem;text-align:left}
.final-row{display:flex;align-items:center;gap:.6rem;padding:.45rem .75rem;border-radius:9px;font-size:.88rem}
.final-row .rank{font-size:.85rem;font-weight:700;color:var(--muted);min-width:1.6rem}
.final-row.winner-row{background:var(--pb)}
.btn-group{display:flex;flex-direction:column;gap:.5rem}
</style>
</head>
<body>
<header class="site-header">
  <h1>English Shiritori</h1>
  <p>Word chain — each word starts with the last letter of the previous</p>
</header>
<div class="card" id="app"></div>

<script>
/* ═══════════════════════════
   CONSTANTS & HELPERS
═══════════════════════════ */
const MAX = 10;
const CC = ['c0','c1','c2','c3','c4','c5','c6','c7','c8','c9'];
const cc = i => CC[i % CC.length];
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const lastChar = w => w[w.length-1].toLowerCase();
const uid = () => Math.random().toString(36).slice(2,9);
const $ = id => document.getElementById(id);

/* ═══════════════════════════
   IDENTITY & ROLE
═══════════════════════════ */
const myClientId = sessionStorage.getItem("s_cid") || uid();
sessionStorage.setItem("s_cid", myClientId);

const roomParam = new URLSearchParams(location.search).get("room");
const amHost = !roomParam;                  // no ?room param → you are host
let mySlot = amHost ? 0 : -1;
let myName = "";

/* ═══════════════════════════
   GAME STATE  (host is source of truth)
═══════════════════════════ */
let G = {
  phase:"lobby",  players:[], turn:0,
  chain:[], used:[], passes:{},
  eliminated:[], winner:null, loseReason:null
};

/* ═══════════════════════════
   NETWORK
═══════════════════════════ */
let peer = null;
let guestConns = [];   // host side: open connections to guests
let hostConn   = null; // guest side: connection to host

/* Helpers ─────────────────── */
function send(conn, obj) {
  try { if(conn && conn.open) conn.send(JSON.stringify(obj)); } catch(e){}
}

function broadcast(obj) {
  const s = JSON.stringify(obj);
  guestConns.forEach(c => { try { if(c.open) c.send(s); } catch(e){} });
}

/* Host: push authoritative state to all guests, then re-render */
function pushState() {
  broadcast({ type:"state", G });
  render();
}

/* Guest: send action to host */
function sendToHost(obj) { send(hostConn, obj); }

/* ═══════════════════════════
   STATUS BAR
═══════════════════════════ */
let _statusMsg = "Connecting…";
let _statusCls = "warn";

function setStatus(msg, cls) {
  _statusMsg = msg; _statusCls = cls;
  const dot = $("sdot"), lbl = $("slbl");
  if(dot) { dot.className = "sdot " + cls; }
  if(lbl) { lbl.textContent = msg; }
}

function statusBarHTML() {
  return `<div class="status-bar"><div class="sdot ${_statusCls}" id="sdot"></div><span id="slbl">${esc(_statusMsg)}</span></div>`;
}

/* ═══════════════════════════
   MESSAGE HANDLER
═══════════════════════════ */
function onMessage(raw) {
  let msg;
  try { msg = typeof raw === "string" ? JSON.parse(raw) : raw; }
  catch { return; }

  if (amHost) {
    /* ── Host receives from guests ── */
    if (msg.type === "join") {
      // Ignore if already joined or game in progress or lobby full
      if (G.phase !== "lobby") return;
      if (G.players.find(p => p.cid === msg.cid)) return;
      if (G.players.length >= MAX) return;
      const slot = G.players.length;
      G.players.push({ cid: msg.cid, name: msg.name, slot });
      pushState();
    } else if (msg.type === "action") {
      applyAction(msg.action);
    }
  } else {
    /* ── Guest receives from host ── */
    if (msg.type === "state") {
      G = msg.G;
      const me = G.players.find(p => p.cid === myClientId);
      if (me) mySlot = me.slot;
      render();
    }
  }
}

/* ═══════════════════════════
   PEERJS  INIT
═══════════════════════════ */
function initPeer(peerId, onOpen) {
  // Use default PeerJS cloud (0.peerjs.com) — most reliable
  peer = new Peer(peerId, { debug: 0 });

  peer.on("open", id => {
    setStatus(amHost ? "Ready — share the link below" : "Connecting to host…", "ok");
    onOpen(id);
  });

  peer.on("error", err => {
    // ID conflict: regenerate
    if (err.type === "unavailable-id") {
      peer.destroy();
      initPeer(uid(), onOpen);
      return;
    }
    setStatus("Connection error: " + err.type, "err");
    console.warn("PeerJS error:", err);
  });

  peer.on("disconnected", () => {
    setStatus("Reconnecting…", "warn");
    try { peer.reconnect(); } catch(e) {}
  });
}

/* ── HOST SETUP ── */
function setupHost() {
  const hostPeerId = "shiri-" + uid();

  initPeer(hostPeerId, id => {
    // Register connection handler IMMEDIATELY when peer opens —
    // before render, before name entry, before anything.
    peer.on("connection", conn => {
      // Accept the connection right away, attach data handler
      conn.on("open", () => {
        guestConns.push(conn);
        // Send them the current state straight away
        send(conn, { type:"state", G });
        const n = guestConns.length;
        setStatus(`${n} guest${n>1?"s":""} connected`, "ok");
        render(); // refresh share URL, player count
      });

      conn.on("data", raw => onMessage(raw));

      conn.on("close", () => {
        guestConns = guestConns.filter(c => c !== conn);
        const n = guestConns.length;
        setStatus(n ? `${n} guest${n>1?"s":""} connected` : "Waiting for players…", n?"ok":"warn");
        render();
      });

      conn.on("error", () => {
        guestConns = guestConns.filter(c => c !== conn);
      });
    });

    render(); // show host name entry screen with correct share URL
  });
}

/* ── GUEST SETUP ── */
function setupGuest() {
  const guestPeerId = "shiri-g-" + uid();

  initPeer(guestPeerId, () => {
    // Peer is ready — connect to host
    const conn = peer.connect(roomParam, {
      reliable: true
      // No serialization override — let PeerJS handle it (defaults to JSON)
    });
    hostConn = conn;

    conn.on("open", () => {
      setStatus("Connected — sending join…", "ok");
      // Send join immediately — myName is already set (we collected it before connecting)
      send(conn, { type:"join", cid: myClientId, name: myName });
    });

    conn.on("data", raw => onMessage(raw));

    conn.on("close", () => {
      setStatus("Disconnected from host", "err");
      setTimeout(() => {
        $("app").innerHTML = disconnectedHTML("Host disconnected");
      }, 400);
    });

    conn.on("error", e => {
      setStatus("Connection error", "err");
      console.warn("conn error", e);
    });
  });
}

/* ═══════════════════════════
   GAME LOGIC  (host authoritative)
═══════════════════════════ */
function getActive() { return G.players.filter(p => !G.eliminated.includes(p.slot)); }
function getCurrentTurn() { const a = getActive(); return a.length ? a[G.turn % a.length] : null; }
function isMyTurn() { const ct = getCurrentTurn(); return ct && ct.cid === myClientId; }

function applyAction(action) {
  if (!amHost) return; // guests never call this directly

  if (action.type === "start") {
    if (G.players.length < 2) return;
    Object.assign(G, { phase:"game", turn:0, chain:[], used:[], passes:{}, eliminated:[], winner:null, loseReason:null });

  } else if (action.type === "word") {
    const { word, slot, valid } = action;
    const req = G.chain.length ? lastChar(G.chain[G.chain.length-1].word) : null;
    if (req && word[0] !== req)  { doEliminate(slot, "invalid");  return; }
    if (G.used.includes(word))   { doEliminate(slot, "repeated"); return; }
    if (!valid)                  { doEliminate(slot, "notaword"); return; }
    G.chain.push({ word, slot });
    G.used.push(word);
    G.turn = (G.turn + 1) % getActive().length;

  } else if (action.type === "pass") {
    G.passes[action.slot] = (G.passes[action.slot] || 0) + 1;
    G.turn = (G.turn + 1) % getActive().length;

  } else if (action.type === "end") {
    Object.assign(G, { phase:"lobby", chain:[], used:[], passes:{}, eliminated:[], winner:null, loseReason:null, turn:0 });

  } else if (action.type === "again") {
    Object.assign(G, { phase:"game", turn:0, chain:[], used:[], passes:{}, eliminated:[], winner:null, loseReason:null });
  }

  pushState();
}

function doEliminate(slot, reason) {
  if (G.eliminated.includes(slot)) return;
  G.eliminated.push(slot);
  G.loseReason = reason;
  const rem = getActive();
  if (rem.length <= 1) {
    G.phase = "over";
    G.winner = rem.length ? rem[0].slot : null;
  } else {
    G.turn = G.turn % rem.length;
  }
}

function dispatch(action) {
  if (amHost) { applyAction(action); }
  else        { sendToHost({ type:"action", action }); }
}

/* ═══════════════════════════
   DICTIONARY
═══════════════════════════ */
const wordCache = {};
async function isRealWord(word) {
  if (word in wordCache) return wordCache[word];
  try {
    const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    return (wordCache[word] = r.ok);
  } catch { return (wordCache[word] = true); } // fail open if offline
}

/* ═══════════════════════════
   RENDER
═══════════════════════════ */
function render() {
  const app = $("app");
  const me = G.players.find(p => p.cid === myClientId);

  // Name entry screens — shown before player is in the game
  if (!me) {
    app.innerHTML = amHost ? hostEntryHTML() : guestEntryHTML();
    bindEntry();
    return;
  }

  if (G.phase === "lobby") app.innerHTML = lobbyHTML();
  else if (G.phase === "game") app.innerHTML = gameHTML();
  else app.innerHTML = overHTML();
  bind();
}

/* ── Name entry: host ── */
function hostEntryHTML() {
  const shareUrl = peer && peer.id ? getJoinUrl(peer.id) : "…generating link…";
  return `
    ${statusBarHTML()}
    <div class="eyebrow">New Game — Step 1</div>
    <div class="rules">
      <b>How to play:</b> Players take turns chaining words. Each word must start with
      the <b>last letter</b> of the previous, and be a real dictionary word.
      Wrong letter, repeat, or fake word = <b>eliminated</b>. Last one standing wins.
      Each player gets <b>1 pass</b>.
    </div>
    <div class="name-row">
      <input type="text" id="entry-name" placeholder="Your name (you are the host)" maxlength="20" autofocus>
      <button class="btn btn-primary btn-sm" id="entry-btn">Continue</button>
    </div>
    <div class="invite-box" style="margin-top:.5rem">
      <div class="inv-label">Your invite link (share now — works immediately)</div>
      <div class="link-row">
        <span id="share-url">${esc(shareUrl)}</span>
        <button class="link-copy" id="copy-btn">Copy</button>
      </div>
      <div class="waiting-row"><div class="pulse"></div>Guests can join while you set up</div>
    </div>`;
}

/* ── Name entry: guest ── */
function guestEntryHTML() {
  return `
    ${statusBarHTML()}
    <div class="eyebrow">Join Game</div>
    <div class="name-row">
      <input type="text" id="entry-name" placeholder="Your name" maxlength="20" autofocus>
      <button class="btn btn-primary btn-sm" id="entry-btn">Join →</button>
    </div>`;
}

function getJoinUrl(hostId) {
  return `${location.origin}${location.pathname}?room=${hostId}`;
}

/* ── Lobby ── */
function lobbyHTML() {
  const shareUrl = (amHost && peer && peer.id) ? getJoinUrl(peer.id) : "";
  const canStart = amHost && G.players.length >= 2;

  const playerRows = G.players.map((p,i) => `
    <div class="player-row filled ${cc(p.slot)}">
      <div class="p-dot"></div>
      <div class="p-name">${esc(p.name)}${p.cid===myClientId?' <span style="font-size:.74rem;opacity:.55">(you)</span>':""}</div>
      <div class="p-badge">${i===0?"Host":"Player "+(i+1)}</div>
    </div>`).join("");

  const emptyCount = Math.max(0, 2 - G.players.length);
  const emptyRows = Array.from({length:emptyCount},(_,i)=>
    `<div class="player-row empty">Waiting for player ${G.players.length+i+1}…</div>`
  ).join("");

  const hostControls = amHost
    ? `<button class="btn btn-primary" id="start-btn" ${canStart?"":"disabled"}>
         ${canStart ? "Start game →" : "Need at least 2 players to start"}
       </button>`
    : `<div class="waiting-row"><div class="pulse"></div>Waiting for host to start the game…</div>`;

  return `
    ${statusBarHTML()}
    <div class="eyebrow">Game Lobby</div>
    <div class="player-list">${playerRows}${emptyRows}</div>
    <div class="slots-note">${G.players.length} / ${MAX} players joined</div>
    ${shareUrl ? `
    <div class="invite-box">
      <div class="inv-label">Invite more players</div>
      <div class="inv-desc">Anyone who opens this link joins your room live.</div>
      <div class="link-row">
        <span id="share-url">${esc(shareUrl)}</span>
        <button class="link-copy" id="copy-btn">Copy</button>
      </div>
      ${G.players.length < MAX
        ? `<div class="waiting-row"><div class="pulse"></div>${MAX-G.players.length} slot${MAX-G.players.length!==1?"s":""} open</div>`
        : `<div class="waiting-row" style="color:#639922">Lobby full!</div>`}
    </div>` : ""}
    ${hostControls}`;
}

/* ── Game ── */
function gameHTML() {
  const ct = getCurrentTurn();
  const myTurn = isMyTurn();
  const req = G.chain.length ? lastChar(G.chain[G.chain.length-1].word) : null;

  const scoreRows = G.players.map(p => {
    const isActive = ct && p.slot === ct.slot;
    const isElim = G.eliminated.includes(p.slot);
    const words = G.chain.filter(e => e.slot === p.slot).length;
    return `<div class="score-row ${cc(p.slot)} ${isActive?"active-turn":""} ${isElim?"eliminated":""}">
      <div class="s-dot"></div>
      <div class="s-name">${esc(p.name)}${p.cid===myClientId?' <span style="font-size:.72rem;opacity:.5">(you)</span>':""}</div>
      <div class="s-words">${words}</div>
    </div>`;
  }).join("");

  const chainBody = !G.chain.length
    ? `<span class="chain-empty">Any word to begin…</span>`
    : G.chain.map((e,i) => {
        const pl = G.players.find(p => p.slot === e.slot);
        return (i ? `<span class="arr">›</span>` : "") +
          `<span class="chip ${cc(e.slot)}" title="${pl ? esc(pl.name) : ""}">${esc(e.word)}</span>`;
      }).join("");

  const reqHTML = req
    ? `<div class="req-letter">Must start with <span class="letter-badge">${req.toUpperCase()}</span></div>`
    : `<div class="req-letter" style="color:var(--faint)">Any word to begin</div>`;

  const canPass = ct && (G.passes[ct.slot]||0) < 1;

  const inputSection = myTurn ? `
    <div class="input-row">
      <input type="text" id="word-input" placeholder="Your word…"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus>
      <button class="btn btn-primary btn-sm" id="play-btn">Play</button>
    </div>
    <div class="error" id="err"></div>
    <div class="action-row">
      ${canPass
        ? `<button class="btn btn-sm" id="pass-btn">Pass (1 left)</button>`
        : `<button class="btn btn-sm" disabled>No passes left</button>`}
      <button class="btn btn-sm btn-ghost" id="end-btn">End game</button>
    </div>` : `
    <div style="text-align:center;font-size:.88rem;color:var(--muted);padding:.5rem 0 .75rem">
      ⏳ Waiting for <b>${ct ? esc(ct.name) : "…"}</b> to play…
    </div>
    <div class="action-row" style="justify-content:center">
      <button class="btn btn-sm btn-ghost" id="end-btn">End game</button>
    </div>`;

  return `
    ${statusBarHTML()}
    <div class="scoreboard">${scoreRows}</div>
    <div class="turn-banner ${ct ? cc(ct.slot) : ""}">
      <div class="turn-dot"></div>
      ${ct ? esc(ct.name) + (myTurn ? " — your turn!" : "'s turn") : ""}
    </div>
    <div class="chain-label">Word chain — ${G.chain.length} word${G.chain.length!==1?"s":""}</div>
    <div class="chain-wrap">${chainBody}</div>
    ${reqHTML}
    ${inputSection}`;
}

/* ── Game over ── */
function overHTML() {
  const loserOrder = [...G.eliminated].reverse();
  const ranking = G.winner !== null ? [G.winner, ...loserOrder] : loserOrder;
  const wp = G.players.find(p => p.slot === G.winner);
  const fp = G.eliminated.length ? G.players.find(p => p.slot === G.eliminated[0]) : null;
  const whyMap = { invalid:"wrong starting letter", repeated:"repeated a word", notaword:"not a real word" };

  const rows = ranking.map((slot,i) => {
    const p = G.players.find(p => p.slot === slot);
    if (!p) return "";
    const medal = ["🥇","🥈","🥉"][i] || `${i+1}.`;
    const words = G.chain.filter(e => e.slot === slot).length;
    return `<div class="final-row ${i===0?"winner-row":""} ${cc(slot)}">
      <span class="rank">${medal}</span>
      <div style="width:9px;height:9px;border-radius:50%;background:var(--pc);flex-shrink:0"></div>
      <div style="flex:1;font-weight:500">${esc(p.name)}</div>
      <div style="font-size:.82rem;color:var(--muted)">${words} word${words!==1?"s":""}</div>
    </div>`;
  }).join("");

  return `
    ${statusBarHTML()}
    <div class="over-wrap">
      <span class="trophy">🏆</span>
      <h2>${wp ? esc(wp.name) : "Game over"}!</h2>
      <p class="over-sub">
        ${fp ? `${esc(fp.name)} eliminated first (${whyMap[G.loseReason]||"error"}).` : ""}
        <br>${G.players.length} players · ${G.chain.length} words played
      </p>
      <div class="final-list">${rows}</div>
      <div class="btn-group">
        ${amHost ? `<button class="btn btn-primary" id="again-btn">Play again (same players)</button>` : ""}
        <button class="btn" id="newgame-btn">New game</button>
      </div>
    </div>`;
}

function disconnectedHTML(reason) {
  return `<div style="text-align:center;padding:2rem 0">
    <div style="font-size:2rem;margin-bottom:.75rem">🔌</div>
    <div style="font-weight:600">${esc(reason)}</div>
    <div style="color:var(--muted);font-size:.88rem;margin-top:.5rem">The host may have closed the tab.</div>
    <div style="margin-top:1.5rem">
      <a href="${location.origin+location.pathname}" style="color:#7f77dd;font-weight:500;text-decoration:none">← Start a new game</a>
    </div>
  </div>`;
}

/* ═══════════════════════════
   BIND EVENTS
═══════════════════════════ */
function bindEntry() {
  const btn = $("entry-btn");
  const inp = $("entry-name");
  const cb  = $("copy-btn");

  if (cb) cb.onclick = copyLink;

  const go = () => {
    const name = inp ? inp.value.trim() : "";
    if (!name) { if(inp) inp.focus(); return; }
    myName = name;

    if (amHost) {
      // Add host to player list
      mySlot = 0;
      G.players.push({ cid: myClientId, name, slot: 0 });
      // Push state so any already-connected guests get updated
      pushState();
    } else {
      // Guest: connect to host now that we have a name
      btn.disabled = true;
      if(inp) inp.disabled = true;
      setStatus("Connecting to host…", "warn");
      setupGuest();
    }
  };

  if(btn) btn.onclick = go;
  if(inp) inp.onkeydown = e => { if(e.key === "Enter") go(); };
}

function bind() {
  const cb = $("copy-btn");
  if (cb) cb.onclick = copyLink;

  if (G.phase === "lobby") {
    const sb = $("start-btn");
    if(sb) sb.onclick = () => dispatch({ type:"start" });
  }

  if (G.phase === "game") {
    const wi = $("word-input");
    const wb = $("play-btn");
    const pb = $("pass-btn");
    const eb = $("end-btn");

    const doPlay = async () => {
      if (!wi || !isMyTurn()) return;
      const word = wi.value.trim().toLowerCase().replace(/[^a-z]/g,"");
      const errEl = $("err");
      if (!word) { if(errEl) errEl.textContent = "Please enter a word."; return; }

      const req = G.chain.length ? lastChar(G.chain[G.chain.length-1].word) : null;
      if (req && word[0] !== req) { dispatch({ type:"word", word, slot:mySlot, valid:false }); return; }
      if (G.used.includes(word))  { dispatch({ type:"word", word, slot:mySlot, valid:false }); return; }

      // Dictionary check
      if(wb) wb.disabled = true;
      if(wi) wi.disabled = true;
      if(errEl) errEl.innerHTML = `<div class="checking"><div class="spinner"></div>Checking "${esc(word)}"…</div>`;
      const valid = await isRealWord(word);
      if(wb) wb.disabled = false;
      if(wi) { wi.disabled = false; wi.focus(); }
      if(errEl) errEl.innerHTML = "";

      if (!valid) {
        if(errEl) errEl.textContent = `"${word}" isn't in the dictionary!`;
        setTimeout(() => dispatch({ type:"word", word, slot:mySlot, valid:false }), 900);
        return;
      }
      dispatch({ type:"word", word, slot:mySlot, valid:true });
    };

    if(wb) wb.onclick = doPlay;
    if(wi) wi.onkeydown = e => { if(e.key==="Enter") doPlay(); };
    if(pb) pb.onclick = () => { if(isMyTurn()) dispatch({ type:"pass", slot:mySlot }); };
    if(eb) eb.onclick = () => { if(confirm("End the game for everyone?")) dispatch({ type:"end" }); };
  }

  if (G.phase === "over") {
    const ab = $("again-btn");
    const nb = $("newgame-btn");
    if(ab) ab.onclick = () => dispatch({ type:"again" });
    if(nb) nb.onclick = () => { location.href = location.origin + location.pathname; };
  }
}

function copyLink() {
  const el = $("share-url");
  const url = el ? el.textContent : (peer && peer.id ? getJoinUrl(peer.id) : "");
  if (!url || url === "…generating link…") return;
  navigator.clipboard.writeText(url)
    .then(() => {
      const cb = $("copy-btn");
      if(cb) { cb.textContent = "Copied!"; setTimeout(()=>{ if($("copy-btn")) $("copy-btn").textContent="Copy"; }, 1800); }
    })
    .catch(() => prompt("Copy this link:", url));
}

/* ═══════════════════════════
   START
═══════════════════════════ */
if (amHost) {
  setupHost();   // sets up PeerJS + connection listener immediately
} else {
  // Guest: just render the name entry screen.
  // Actual connection happens after they enter their name.
  setStatus("Enter your name to join", "ok");
  render();
}
</script>
</body>
</html>
